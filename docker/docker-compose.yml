services:
  claude-ollama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-ollama
    environment:
      # ── Anthropic ──────────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # ── Sentry ─────────────────────────────────────────
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      - SENTRY_ORG=${SENTRY_ORG:-tekton-as}
      - SENTRY_PROJECT=${SENTRY_PROJECT:-php-laravel}
      - SENTRY_REGION=${SENTRY_REGION:-https://us.sentry.io}

      # ── JIRA / Atlassian ───────────────────────────────
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}

      # ── Ollama ─────────────────────────────────────────
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}

      # ── Poner en "true" para ejecutar el workflow al iniciar
      - RUN_WORKFLOW=${RUN_WORKFLOW:-false}

    volumes:
      - ../:/workspace
      - ollama_data:/root/.ollama
      - claude_config:/root/.claude
    ports:
      - "11434:11434"
    stdin_open: true
    tty: true
    # Para GPU NVIDIA (opcional, descomentar si tienes GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
  claude_config:
